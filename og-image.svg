<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="AI-enhanced Educational Game Design — microcredential handbook at teachplay.dev">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9E1B32"/>
      <stop offset="60%" stop-color="#7a0019"/>
      <stop offset="100%" stop-color="#5a0d18"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8253f"/>
      <stop offset="100%" stop-color="#7a0019"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="315" rx="520" ry="420" fill="url(#glow)"/>

  <!-- Left column: text -->
  <!-- Eyebrow -->
  <text x="70" y="110" fill="#ffb3b8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3.8">
    THE UNIVERSITY OF ALABAMA · COLLEGE OF EDUCATION
  </text>

  <!-- Accent bar -->
  <rect x="70" y="140" width="64" height="4" fill="#ffffff" opacity="0.9"/>

  <!-- Title (3 lines) -->
  <text x="70" y="230" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.2">AI-enhanced</text>
  <text x="70" y="302" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.2">Educational</text>
  <text x="70" y="374" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.2" font-style="italic">Game Design.</text>

  <!-- Tagline -->
  <text x="70" y="440" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" opacity="0.92">
    A twelve-session microcredential handbook —
  </text>
  <text x="70" y="472" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" opacity="0.92">
    objectives, playtest, evidence, credential.
  </text>

  <!-- Bottom row -->
  <line x1="70" y1="530" x2="1130" y2="530" stroke="#ffffff" stroke-width="1" opacity="0.25"/>

  <text x="70" y="575" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="1.8">teachplay.dev</text>

  <text x="70" y="575" fill="#ffb3b8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="3.2" text-anchor="start" dx="220">
    12 SESSIONS · 36 HOURS · 5 DELIVERABLES · OBv3
  </text>

  <!-- Right column: badge shield -->
  <g transform="translate(890, 190)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="180" fill="#161616" opacity="0.3"/>
    <circle cx="0" cy="0" r="172" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>

    <!-- Shield -->
    <path d="M 0 -148 L 142 -100 L 142 20 Q 142 112 0 172 Q -142 112 -142 20 L -142 -100 Z" fill="url(#shield)"/>

    <!-- Inner border -->
    <path d="M 0 -130 L 122 -88 L 122 18 Q 122 100 0 152 Q -122 100 -122 18 L -122 -88 Z" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>

    <!-- Top divider -->
    <line x1="-100" y1="-64" x2="100" y2="-64" stroke="#ffffff" stroke-width="0.8" opacity="0.35"/>

    <!-- Label above divider -->
    <text x="0" y="-90" text-anchor="middle" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.8">MICROCREDENTIAL</text>

    <!-- State-machine glyph (5 nodes) -->
    <g stroke="#ffffff" stroke-width="2" fill="none" opacity="0.95">
      <circle cx="-58" cy="-16" r="10" fill="#ffffff"/>
      <circle cx="-22" cy="-44" r="10"/>
      <circle cx="22" cy="-44" r="10"/>
      <circle cx="58" cy="-16" r="10"/>
      <circle cx="0" cy="28" r="10" fill="#ffffff"/>
      <path d="M -48 -18 L -32 -38" />
      <path d="M -12 -44 L 12 -44" />
      <path d="M 32 -38 L 48 -18" />
      <path d="M 52 -6 L 8 22" />
      <path d="M -8 22 L -52 -6" />
    </g>

    <!-- Deliverables row -->
    <line x1="-72" y1="74" x2="72" y2="74" stroke="#ffffff" stroke-width="0.8" opacity="0.45"/>
    <text x="0" y="100" text-anchor="middle" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="3">D1 · D2 · D3 · D4 · D5</text>
    <text x="0" y="130" text-anchor="middle" fill="#ffb3b8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2.4">NON-COMPENSATORY · PROFICIENT FLOOR</text>
  </g>
</svg>
