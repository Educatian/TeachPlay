<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750"
     font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="750" fill="#fdf8f5"/>

  <!-- title -->
  <text x="100" y="60" font-size="13" font-weight="700"
        letter-spacing="0.16em" fill="#9E1B32" text-transform="uppercase">FIGURE · STEP 09</text>
  <text x="100" y="92" font-size="22" font-weight="700" fill="#2c2a29">
    API call sequence per survey — one shell, blocks, questions, flow, options
  </text>
  <text x="100" y="118" font-size="13" fill="#6e6967">
    Deterministic order. SurveyID resolves at call 1 and threads through the rest.
  </text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#9E1B32"/>
    </marker>
  </defs>

  <!-- timeline rule -->
  <line x1="100" y1="510" x2="1100" y2="510" stroke="#d6cfc8" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- 5 step nodes, x = 130, 320, 540, 760, 970 -->
  <!-- ============= NODE 1 ============= -->
  <g transform="translate(100,180)">
    <rect width="190" height="290" rx="6" fill="#fefcfa" stroke="#ebe5e0" stroke-width="1"/>
    <rect width="4" height="290" fill="#9E1B32"/>
    <text x="20" y="32" font-size="10" font-weight="800" letter-spacing="0.18em"
          fill="#9E1B32" text-transform="uppercase">CALL 01</text>

    <text x="20" y="60" font-size="11" font-weight="800" fill="#9E1B32" letter-spacing="0.04em">POST</text>
    <text x="60" y="60" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">/survey-definitions</text>

    <text x="20" y="100" font-size="13" font-weight="700" fill="#2c2a29">Create survey shell</text>

    <text x="20" y="135" font-size="11" fill="#6e6967">Body</text>
    <text x="20" y="153" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">SurveyName</text>
    <text x="20" y="170" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">Language: EN</text>
    <text x="20" y="187" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">ProjectCategory</text>

    <line x1="20" y1="210" x2="170" y2="210" stroke="#ebe5e0" stroke-width="1"/>

    <text x="20" y="232" font-size="10" font-weight="700" letter-spacing="0.1em"
          fill="#5a7a3a" text-transform="uppercase">Returns</text>
    <text x="20" y="252" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">SurveyID</text>
    <text x="20" y="269" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">DefaultBlockID</text>

    <text x="95" y="320" font-size="10" fill="#8a8278" text-anchor="middle">×1 call</text>
  </g>

  <!-- ============= NODE 2 ============= -->
  <g transform="translate(310,180)">
    <rect width="190" height="290" rx="6" fill="#fefcfa" stroke="#ebe5e0" stroke-width="1"/>
    <rect width="4" height="290" fill="#9E1B32"/>
    <text x="20" y="32" font-size="10" font-weight="800" letter-spacing="0.18em"
          fill="#9E1B32" text-transform="uppercase">CALL 02–06</text>

    <text x="20" y="60" font-size="11" font-weight="800" fill="#9E1B32" letter-spacing="0.04em">POST</text>
    <text x="60" y="60" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">.../blocks</text>

    <text x="20" y="100" font-size="13" font-weight="700" fill="#2c2a29">Add 5 construct blocks</text>

    <text x="20" y="135" font-size="11" fill="#6e6967">Body × 5</text>
    <text x="20" y="153" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">Type: Standard</text>
    <text x="20" y="170" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">Description</text>
    <text x="20" y="187" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">BlockElements: []</text>

    <line x1="20" y1="210" x2="170" y2="210" stroke="#ebe5e0" stroke-width="1"/>

    <text x="20" y="232" font-size="10" font-weight="700" letter-spacing="0.1em"
          fill="#5a7a3a" text-transform="uppercase">Returns</text>
    <text x="20" y="252" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">5 × BlockID</text>
    <text x="20" y="269" font-size="11" fill="#6e6967" font-style="italic">+ Default block</text>

    <text x="95" y="320" font-size="10" fill="#8a8278" text-anchor="middle">×5 calls</text>
  </g>

  <!-- ============= NODE 3 ============= -->
  <g transform="translate(520,180)">
    <rect width="190" height="290" rx="6" fill="#fefcfa" stroke="#ebe5e0" stroke-width="1"/>
    <rect width="4" height="290" fill="#9E1B32"/>
    <text x="20" y="32" font-size="10" font-weight="800" letter-spacing="0.18em"
          fill="#9E1B32" text-transform="uppercase">CALL 07–28</text>

    <text x="20" y="60" font-size="11" font-weight="800" fill="#9E1B32" letter-spacing="0.04em">POST</text>
    <text x="60" y="60" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">.../questions</text>

    <text x="20" y="100" font-size="13" font-weight="700" fill="#2c2a29">Add 22 question items</text>

    <text x="20" y="135" font-size="11" fill="#6e6967">Per item</text>
    <text x="20" y="153" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">QuestionType: MC</text>
    <text x="20" y="170" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">Selector: SAVR</text>
    <text x="20" y="187" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">DataExportTag</text>

    <line x1="20" y1="210" x2="170" y2="210" stroke="#ebe5e0" stroke-width="1"/>

    <text x="20" y="232" font-size="10" font-weight="700" letter-spacing="0.1em"
          fill="#5a7a3a" text-transform="uppercase">Returns</text>
    <text x="20" y="252" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">22 × QuestionID</text>
    <text x="20" y="269" font-size="11" fill="#6e6967" font-style="italic">routed to blockId</text>

    <text x="95" y="320" font-size="10" fill="#8a8278" text-anchor="middle">×22 calls</text>
  </g>

  <!-- ============= NODE 4 ============= -->
  <g transform="translate(730,180)">
    <rect width="190" height="290" rx="6" fill="#fefcfa" stroke="#ebe5e0" stroke-width="1"/>
    <rect width="4" height="290" fill="#9E1B32"/>
    <text x="20" y="32" font-size="10" font-weight="800" letter-spacing="0.18em"
          fill="#9E1B32" text-transform="uppercase">CALL 29</text>

    <text x="20" y="60" font-size="11" font-weight="800" fill="#9E1B32" letter-spacing="0.04em">PUT</text>
    <text x="60" y="60" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">.../flow</text>

    <text x="20" y="100" font-size="13" font-weight="700" fill="#2c2a29">Set survey flow</text>

    <text x="20" y="135" font-size="11" fill="#6e6967">Body</text>
    <text x="20" y="153" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">EmbeddedData:</text>
    <text x="20" y="170" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">  cohort</text>
    <text x="20" y="187" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">Block sequence</text>

    <line x1="20" y1="210" x2="170" y2="210" stroke="#ebe5e0" stroke-width="1"/>

    <text x="20" y="232" font-size="10" font-weight="700" letter-spacing="0.1em"
          fill="#5a7a3a" text-transform="uppercase">Effect</text>
    <text x="20" y="252" font-size="11" fill="#2c2a29">cohort param</text>
    <text x="20" y="269" font-size="11" fill="#2c2a29">captured via URL</text>

    <text x="95" y="320" font-size="10" fill="#8a8278" text-anchor="middle">×1 call</text>
  </g>

  <!-- ============= NODE 5 ============= -->
  <g transform="translate(940,180)">
    <rect width="190" height="290" rx="6" fill="#fefcfa" stroke="#ebe5e0" stroke-width="1"/>
    <rect width="4" height="290" fill="#9E1B32"/>
    <text x="20" y="32" font-size="10" font-weight="800" letter-spacing="0.18em"
          fill="#9E1B32" text-transform="uppercase">CALL 30</text>

    <text x="20" y="60" font-size="11" font-weight="800" fill="#9E1B32" letter-spacing="0.04em">GET → PUT</text>
    <text x="20" y="78" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">.../options</text>

    <text x="20" y="108" font-size="13" font-weight="700" fill="#2c2a29">Apply theme</text>

    <text x="20" y="140" font-size="11" fill="#6e6967">Merge keys</text>
    <text x="20" y="158" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">Header / Footer</text>
    <text x="20" y="175" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">ProgressBar</text>
    <text x="20" y="192" font-size="11" font-family="SF Mono, Menlo, Consolas, monospace" fill="#2c2a29">SurveyTitle</text>

    <line x1="20" y1="210" x2="170" y2="210" stroke="#ebe5e0" stroke-width="1"/>

    <text x="20" y="232" font-size="10" font-weight="700" letter-spacing="0.1em"
          fill="#5a7a3a" text-transform="uppercase">Effect</text>
    <text x="20" y="252" font-size="11" fill="#2c2a29">UA Crimson skin</text>
    <text x="20" y="269" font-size="11" fill="#2c2a29">isActive=false</text>

    <text x="95" y="320" font-size="10" fill="#8a8278" text-anchor="middle">×1 call</text>
  </g>

  <!-- arrows between nodes (top-of-card connectors) -->
  <line x1="290" y1="325" x2="312" y2="325" stroke="#9E1B32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="325" x2="522" y2="325" stroke="#9E1B32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="325" x2="732" y2="325" stroke="#9E1B32" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="920" y1="325" x2="942" y2="325" stroke="#9E1B32" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- summary bar -->
  <g transform="translate(100,580)">
    <rect width="1030" height="58" fill="#fbf6f7" stroke="#9E1B32" stroke-width="1"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#9E1B32" letter-spacing="0.04em">
      Total per survey: 30 API calls
    </text>
    <text x="20" y="46" font-size="12" fill="#2c2a29">
      Both surveys (Pre 20 items + Post 22 items) created with isActive=false. Activation is a separate explicit call after IRB R4.
    </text>
  </g>

  <!-- footer note -->
  <text x="100" y="700" font-size="11" fill="#8a8278">
    All endpoints under https://pdx1.qualtrics.com/API/v3 · Auth via X-API-TOKEN header · helper module wraps the calls in qualtrics_helper.py
  </text>
</svg>
