<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000"
     font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="1000" fill="#fdf8f5"/>

  <!-- title -->
  <text x="80" y="74" font-size="18" font-weight="700"
        letter-spacing="0.18em" fill="#9E1B32">FIGURE · DESIGN TRIAD</text>
  <text x="80" y="128" font-size="38" font-weight="700" fill="#2c2a29">
    Objective &#8594; Mechanic &#8594; Evidence
  </text>
  <text x="80" y="168" font-size="24" fill="#6e6967">
    Every gamelet ties one learning objective to one mechanic to one observable evidence signal.
  </text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9E1B32"/>
    </marker>
  </defs>

  <!-- triangle edges (directed: objective->mechanic->evidence->objective) -->
  <!-- apex (Objective) 600,330 ; base-left (Mechanic) 250,790 ; base-right (Evidence) 950,790 -->
  <line x1="560" y1="392" x2="300" y2="728" stroke="#9E1B32" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="330" y1="800" x2="870" y2="800" stroke="#9E1B32" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="900" y1="728" x2="640" y2="392" stroke="#9E1B32" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- edge labels -->
  <g text-anchor="middle">
    <text x="378" y="556" font-size="22" font-weight="700" fill="#2c2a29" transform="rotate(-52 378 556)">alignment rationale</text>
    <text x="600" y="846" font-size="22" font-weight="700" fill="#2c2a29">observable signal</text>
    <text x="822" y="556" font-size="22" font-weight="700" fill="#2c2a29" transform="rotate(52 822 556)">claim it supports</text>
  </g>

  <!-- vertex: Learning Objective (apex) -->
  <g transform="translate(600,330)" text-anchor="middle">
    <circle r="58" fill="#9E1B32"/>
    <circle r="58" fill="none" stroke="#fdf8f5" stroke-width="3"/>
    <text y="-70" font-size="15" font-weight="800" letter-spacing="0.16em" fill="#9E1B32">VERTEX 01</text>
    <text y="-44" font-size="0" fill="none">.</text>
    <text y="8" font-size="22" font-weight="800" fill="#fefcfa">OBJ</text>
    <text y="108" font-size="26" font-weight="700" fill="#2c2a29">Learning Objective</text>
    <text y="138" font-size="19" fill="#6e6967">what the learner should be able to do</text>
  </g>

  <!-- vertex: Game Mechanic (base-left) -->
  <g transform="translate(250,790)" text-anchor="middle">
    <circle r="58" fill="#9E1B32"/>
    <circle r="58" fill="none" stroke="#fdf8f5" stroke-width="3"/>
    <text y="8" font-size="22" font-weight="800" fill="#fefcfa">MECH</text>
    <text y="-86" font-size="15" font-weight="800" letter-spacing="0.16em" fill="#9E1B32">VERTEX 02</text>
    <text y="108" font-size="26" font-weight="700" fill="#2c2a29">Game Mechanic</text>
    <text y="138" font-size="19" fill="#6e6967">the action the game asks for</text>
  </g>

  <!-- vertex: Evidence of Learning (base-right) -->
  <g transform="translate(950,790)" text-anchor="middle">
    <circle r="58" fill="#9E1B32"/>
    <circle r="58" fill="none" stroke="#fdf8f5" stroke-width="3"/>
    <text y="8" font-size="22" font-weight="800" fill="#fefcfa">EVID</text>
    <text y="-86" font-size="15" font-weight="800" letter-spacing="0.16em" fill="#9E1B32">VERTEX 03</text>
    <text y="108" font-size="26" font-weight="700" fill="#2c2a29">Evidence of Learning</text>
    <text y="138" font-size="19" fill="#6e6967">the signal that proves it happened</text>
  </g>

  <!-- footnote -->
  <text x="80" y="958" font-size="20" fill="#8a8278">
    A gamelet design is defensible only when all three vertices connect: break one edge and the credential claim breaks with it.
  </text>
</svg>
