<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"
     font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1600" height="1000" fill="#fdf8f5"/>

  <!-- title -->
  <text x="100" y="80" font-size="23" font-weight="700"
        letter-spacing="0.18em" fill="#9E1B32" text-transform="uppercase">FIGURE · OVERVIEW</text>
  <text x="100" y="115" font-size="34" font-weight="700" fill="#2c2a29">
    Eight prompts, one survey
  </text>
  <text x="100" y="142" font-size="24" fill="#6e6967">
    Token → empty shell → questions → blocks → cohort tag → branding → activate → export.
  </text>

  <!-- baseline dotted -->
  <line x1="120" y1="500" x2="1480" y2="500" stroke="#d6cfc8"
        stroke-width="1" stroke-dasharray="2 5"/>

  <!-- ========= LEFT: KEY (token) ========= -->
  <g transform="translate(120,440)">
    <!-- simple key glyph -->
    <circle cx="14" cy="16" r="13" fill="none" stroke="#9E1B32" stroke-width="3"/>
    <circle cx="14" cy="16" r="4" fill="#9E1B32"/>
    <line x1="27" y1="16" x2="65" y2="16" stroke="#9E1B32" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="16" x2="55" y2="26" stroke="#9E1B32" stroke-width="3" stroke-linecap="round"/>
    <line x1="62" y1="16" x2="62" y2="22" stroke="#9E1B32" stroke-width="3" stroke-linecap="round"/>
    <text x="33" y="80" font-size="20" font-weight="700" fill="#9E1B32"
          letter-spacing="0.08em" text-anchor="middle">TOKEN</text>
  </g>

  <!-- thin connector line through cards -->
  <line x1="200" y1="456" x2="1430" y2="456" stroke="#9E1B32" stroke-width="1.2"/>

  <!-- ========= 8 CARDS ========= -->
  <!-- positions: x = 230, 380, 530, 680, 830, 980, 1130, 1280   width 130 -->
  <!-- card body y=350-560, glyph centered, label below baseline -->

  <!-- helper for repeated card -->
  <defs>
    <g id="card-frame">
      <rect x="0" y="0" width="130" height="170" rx="4"
            fill="#fefcfa" stroke="#d6cfc8" stroke-width="1"/>
    </g>
    <!-- step dot above card -->
    <g id="step-dot">
      <circle cx="0" cy="0" r="4" fill="#9E1B32"/>
    </g>
  </defs>

  <!-- CARD 01 — Connect token (circle glyph) -->
  <g transform="translate(230,360)">
    <use href="#card-frame"/>
    <circle cx="65" cy="80" r="22" fill="none" stroke="#2c2a29" stroke-width="2"/>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 01</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Connect</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">token</text>
  </g>

  <!-- CARD 02 — Empty survey (square glyph) -->
  <g transform="translate(380,360)">
    <use href="#card-frame"/>
    <rect x="43" y="58" width="44" height="44" fill="none" stroke="#2c2a29" stroke-width="2"/>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 02</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Empty</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">survey</text>
  </g>

  <!-- CARD 03 — Add questions (3 stacked lines glyph) -->
  <g transform="translate(530,360)">
    <use href="#card-frame"/>
    <line x1="40" y1="68" x2="90" y2="68" stroke="#2c2a29" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="80" x2="90" y2="80" stroke="#2c2a29" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="92" x2="80" y2="92" stroke="#2c2a29" stroke-width="2.5" stroke-linecap="round"/>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 03</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Add</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">questions</text>
  </g>

  <!-- CARD 04 — Blocks (branching node glyph) -->
  <g transform="translate(680,360)">
    <use href="#card-frame"/>
    <circle cx="50" cy="65" r="5" fill="#2c2a29"/>
    <circle cx="50" cy="95" r="5" fill="#2c2a29"/>
    <circle cx="85" cy="80" r="5" fill="#2c2a29"/>
    <line x1="55" y1="65" x2="80" y2="80" stroke="#2c2a29" stroke-width="1.5"/>
    <line x1="55" y1="95" x2="80" y2="80" stroke="#2c2a29" stroke-width="1.5"/>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 04</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Group</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">into blocks</text>
  </g>

  <!-- CARD 05 — Cohort tag (spark / asterisk glyph) -->
  <g transform="translate(830,360)">
    <use href="#card-frame"/>
    <g transform="translate(65,80)" stroke="#2c2a29" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-22" x2="0" y2="22"/>
      <line x1="-22" y1="0" x2="22" y2="0"/>
      <line x1="-15" y1="-15" x2="15" y2="15"/>
      <line x1="-15" y1="15" x2="15" y2="-15"/>
    </g>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 05</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Cohort</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">tag</text>
  </g>

  <!-- CARD 06 — Theme (paint swatch glyph) -->
  <g transform="translate(980,360)">
    <use href="#card-frame"/>
    <rect x="42" y="58" width="46" height="44" rx="3" fill="#9E1B32" opacity="0.9"/>
    <rect x="50" y="66" width="30" height="6" fill="#fefcfa"/>
    <rect x="50" y="78" width="22" height="6" fill="#fefcfa"/>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 06</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Brand</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">theme</text>
  </g>

  <!-- CARD 07 — Activate (paper plane glyph) -->
  <g transform="translate(1130,360)">
    <use href="#card-frame"/>
    <polygon points="40,90 95,60 70,80 95,60 75,98" fill="none" stroke="#2c2a29" stroke-width="2" stroke-linejoin="round"/>
    <line x1="70" y1="80" x2="75" y2="98" stroke="#2c2a29" stroke-width="2"/>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 07</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Activate</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">&amp; distribute</text>
  </g>

  <!-- CARD 08 — Export (down arrow glyph) -->
  <g transform="translate(1280,360)">
    <use href="#card-frame"/>
    <line x1="65" y1="55" x2="65" y2="100" stroke="#2c2a29" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="48,85 65,103 82,85" fill="none" stroke="#2c2a29" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="48" y1="115" x2="82" y2="115" stroke="#2c2a29" stroke-width="2.5" stroke-linecap="round"/>
    <use href="#step-dot" x="65" y="-10"/>
    <text x="65" y="200" font-size="18" font-weight="800" letter-spacing="0.14em"
          fill="#9E1B32" text-anchor="middle">STEP 08</text>
    <text x="65" y="236" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">Export</text>
    <text x="65" y="270" font-size="23" font-weight="700" fill="#2c2a29" text-anchor="middle">responses</text>
  </g>

  <!-- ========= RIGHT: PAPER STACK (responses) ========= -->
  <g transform="translate(1450,420)">
    <rect x="0" y="0" width="60" height="80" rx="2" fill="#fefcfa" stroke="#d6cfc8" stroke-width="1"
          transform="rotate(-6 30 40)"/>
    <rect x="6" y="6" width="60" height="80" rx="2" fill="#fefcfa" stroke="#d6cfc8" stroke-width="1"/>
    <rect x="12" y="12" width="60" height="80" rx="2" fill="#fefcfa" stroke="#9E1B32" stroke-width="1"
          transform="rotate(4 42 52)"/>
    <line x1="24" y1="32" x2="74" y2="32" stroke="#d6cfc8" stroke-width="1"
          transform="rotate(4 42 52)"/>
    <line x1="24" y1="42" x2="74" y2="42" stroke="#d6cfc8" stroke-width="1"
          transform="rotate(4 42 52)"/>
    <line x1="24" y1="52" x2="68" y2="52" stroke="#d6cfc8" stroke-width="1"
          transform="rotate(4 42 52)"/>
    <text x="33" y="125" font-size="20" font-weight="700" fill="#9E1B32"
          letter-spacing="0.08em" text-anchor="middle">RESPONSES</text>
  </g>

  <!-- footnote -->
  <text x="100" y="930" font-size="20" fill="#8a8278">
    Each card is one paste-ready prompt. The token at left only happens once per machine; the response stack at right is what you analyze.
  </text>
  <text x="100" y="952" font-size="20" fill="#8a8278">
    Steps 02–08 repeat for every new survey or cohort.
  </text>
</svg>
