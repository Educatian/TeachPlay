<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Educational Game Design microcredential badge — The University of Alabama">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#7a0019"/>
    </linearGradient>
    <clipPath id="shield">
      <path d="M 256 24 L 472 96 L 472 272 Q 472 400 256 488 Q 40 400 40 272 L 40 96 Z"/>
    </clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="244" fill="#161616" />
  <circle cx="256" cy="256" r="232" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>

  <!-- Shield -->
  <path d="M 256 48 L 448 112 L 448 272 Q 448 392 256 468 Q 64 392 64 272 L 64 112 Z" fill="url(#bg)"/>

  <!-- Inner shield border -->
  <path d="M 256 72 L 428 128 L 428 268 Q 428 380 256 446 Q 84 380 84 268 L 84 128 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.45"/>

  <!-- Top divider -->
  <line x1="104" y1="160" x2="408" y2="160" stroke="#ffffff" stroke-width="1" opacity="0.35"/>

  <!-- "THE UNIVERSITY OF ALABAMA" -->
  <text x="256" y="128" text-anchor="middle" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="2.2">
    THE UNIVERSITY OF ALABAMA
  </text>

  <!-- Controller-ish iconography: five stacked "nodes" suggesting a state machine / game loop -->
  <g transform="translate(256,248)" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.95">
    <circle cx="-78" cy="0" r="14" fill="#ffffff"/>
    <circle cx="-30" cy="-36" r="14"/>
    <circle cx="30" cy="-36" r="14"/>
    <circle cx="78" cy="0" r="14"/>
    <circle cx="0" cy="48" r="14" fill="#ffffff"/>
    <path d="M -64 0 L -44 -28" />
    <path d="M -16 -36 L 16 -36" />
    <path d="M 44 -28 L 64 0" />
    <path d="M 68 12 L 10 42" />
    <path d="M -10 42 L -68 12" />
  </g>

  <!-- Title -->
  <text x="256" y="340" text-anchor="middle" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="0.5">EDUCATIONAL</text>
  <text x="256" y="378" text-anchor="middle" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="0.5">GAME DESIGN</text>

  <!-- Divider -->
  <line x1="160" y1="398" x2="352" y2="398" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="256" y="422" text-anchor="middle" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="3.2" opacity="0.9">
    MICROCREDENTIAL · 12 SESSIONS
  </text>

  <!-- Cohort year placeholder -->
  <text x="256" y="450" text-anchor="middle" fill="#ffffff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="2.4" opacity="0.7">
    D1 · D2 · D3 · D4 · D5
  </text>
</svg>
