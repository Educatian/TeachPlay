# Cloudflare Workers config for the `teachplay` Worker.
#
# Shape: Worker-with-Assets. The Worker script in src/index.js handles
# every request first; it dispatches /api/* to handlers in src/api/ and
# falls through to env.ASSETS.fetch() for the bound static bucket.
#
# The asset bucket is the repo root, but almost everything non-public
# (node_modules, tools/, src/, docs/, wrangler.toml itself, …) is
# excluded via .assetsignore. Without that file, wrangler tries to
# upload node_modules/workerd/bin/workerd (~118 MiB) and fails the
# 25 MiB per-asset limit.
name = "teachplay"
main = "src/index.js"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "./"
binding = "ASSETS"

# DEPRECATED — per-cohort BitstringStatusList state moved to D1 (migration
# 0007). Workers KV has no compare-and-swap, so the old get→put index
# allocation and read-modify-write revocation could race and conflate two
# learners onto one revocation bit. Status now lives in the status_alloc /
# status_revocations / status_index_map tables on the DB binding below, where
# every statement is atomic (see src/lib/status-list.js). These two namespaces
# are retained only so the bindings stay valid; no runtime code reads them.
[[kv_namespaces]]
binding = "STATUS_BITS"
id = "3b37b02eed3d45139759460ce7b32819"

[[kv_namespaces]]
binding = "STATUS_INDEX"
id = "40b0de3caa6d43f2addec25ff7d9b774"

# CLAIM_CODES — one-time claim codes for wallet handoff.
# key = "cl_<hex>", value = JSON payload for /api/issue.
# Uses KV's native TTL (expiration_ttl) so expired codes self-clean; the
# claim handler additionally `delete`s the key on successful redemption
# so a code is strictly one-shot even if its TTL hasn't fired.
[[kv_namespaces]]
binding = "CLAIM_CODES"
id = "034fef756e8c47598262a721f214d68f"

# CLAIMS_KV — one-time email claim tokens (48 h TTL) + per-IP rate-limit keys.
[[kv_namespaces]]
binding = "CLAIMS_KV"
id = "35d14ddef4714d6e996a3c17251e264b"

# D1 — Learning Record Store (learners + xAPI events)
[[d1_databases]]
binding = "DB"
database_name = "teachplay-lrs"
database_id = "c2749430-248b-4c85-b224-e9e24424e8aa"

# R2 — evidence-file storage (OPTIONAL, currently INACTIVE).
#
# /api/evidence-file feature-detects this binding: when present, uploaded
# portfolio files (screenshots, GDD, video) are stored in R2 with no practical
# size limit; when absent, they fall back to inline D1 storage capped at ~1 MB
# per file (D1's row limit is 2 MB). Enabling R2 needs NO code change.
#
# To enable (R2 must first be turned on in the Cloudflare dashboard — wrangler
# reports "Please enable R2" until then):
#   npx wrangler r2 bucket create teachplay-evidence
# then uncomment the three lines below and redeploy:
# [[r2_buckets]]
# binding = "EVIDENCE_BUCKET"
# bucket_name = "teachplay-evidence"
