<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#be1a2f" />
    <script>
      (() => {
        const lockThemeColor = () => {
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta && meta.getAttribute('content') !== '#be1a2f') meta.setAttribute('content', '#be1a2f');
        };
        lockThemeColor();
        new MutationObserver(lockThemeColor).observe(document.head, { childList: true, subtree: true, attributes: true });
      })();
    </script>
    <meta
      name="description"
      content="TeachPlay is the learner workspace for the AI-Enhanced Educational Game Design microcredential."
    />

    <script type="module" crossorigin src="/app/assets/index-DymYlOKd.js"></script>

    <link rel="modulepreload" crossorigin href="/app/assets/vendor-pdf-ai6kcc3y.js">
    <link rel="modulepreload" crossorigin href="/app/assets/vendor-react-BDFlqc_0.js">
    <link rel="stylesheet" crossorigin href="/app/assets/index-DpvkwfbF.css">
    <link rel="stylesheet" href="/app/teachplay-certificate-preview.css">
    <style>
      .bg-gray-900 .text-gray-500,
      .bg-gray-950 .text-gray-500 {
        color: #9ca3af;
      }

      @media (max-width: 640px) {
        button[aria-label="Open AI tutor"] {
          display: none !important;
        }
      }

      .tp-preview-note {
        margin: 12px 0 22px;
        padding: 14px 16px;
        border: 1px solid #f0c7cf;
        border-radius: 12px;
        background: #fff5f7;
        color: #7f1024;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const preserveChildrenAs = (node, tagName) => {
          const replacement = document.createElement(tagName);
          for (const attr of node.attributes) replacement.setAttribute(attr.name, attr.value);
          while (node.firstChild) replacement.appendChild(node.firstChild);
          node.replaceWith(replacement);
          return replacement;
        };

        const replaceText = (root, replacements) => {
          const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
          const nodes = [];
          while (walker.nextNode()) nodes.push(walker.currentNode);
          nodes.forEach((node) => {
            let value = node.nodeValue;
            replacements.forEach(([from, to]) => {
              value = value.replaceAll(from, to);
            });
            node.nodeValue = value;
          });
        };

        const ensureSinglePageHeading = () => {
          if (document.querySelector('h1')) return;
          const firstSectionHeading = document.querySelector('main h2, #root h2');
          if (firstSectionHeading) preserveChildrenAs(firstSectionHeading, 'h1');
        };

        const addPreviewNote = (headingText, noteId, noteText) => {
          if (document.getElementById(noteId)) return;
          const heading = [...document.querySelectorAll('h1, h2')]
            .find((node) => node.textContent.replace(/\s+/g, ' ').trim() === headingText);
          if (!heading) return;
          const note = document.createElement('div');
          note.id = noteId;
          note.className = 'tp-preview-note';
          note.textContent = noteText;
          heading.insertAdjacentElement('afterend', note);
        };

        const improveLearnerEntry = () => {
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#be1a2f');

          document.querySelectorAll('button').forEach((button) => {
            const label = button.textContent.replace(/\s+/g, ' ').trim();
            if (label === 'Review the credential') button.textContent = 'Start learning';
            if (label === 'View catalog') button.textContent = 'Explore catalog';
            if (label === 'Instructor') button.textContent = 'Instructor tools';
            if ((label === '🌙' || label === '☀️') && !button.getAttribute('aria-label')) {
              button.setAttribute('aria-label', 'Toggle color theme');
            }
          });

          replaceText(document.getElementById('root'), [
            ['Admin Portal', 'Instructor Portal Preview'],
            ['Super Admin', 'Instructor Preview'],
            ['Test Role:', 'Preview Role:'],
            ['Welcome back, Guest. Track your progress and badges.', 'Preview dashboard for a sample learner. Sign in to save progress, certificates, and submissions.'],
          ]);

          const logoHeading = [...document.querySelectorAll('h1')]
            .find((heading) => heading.textContent.replace(/\s+/g, ' ').trim() === 'TeachPlay');
          if (logoHeading) preserveChildrenAs(logoHeading, 'div');

          [...document.querySelectorAll('h4')].forEach((heading) => {
            const text = heading.textContent.replace(/\s+/g, ' ').trim();
            if (text === 'The University of Alabama') preserveChildrenAs(heading, 'h3');
          });

          ensureSinglePageHeading();
          addPreviewNote('My Dashboard', 'tp-dashboard-preview-note', 'This dashboard is a signed-out preview. Learners should sign in before submitting evidence or expecting progress to persist.');
          addPreviewNote('Management Console', 'tp-instructor-preview-note', 'Instructor tools are preview-only until an authorized instructor signs in.');
        };

        improveLearnerEntry();
        const observer = new MutationObserver(improveLearnerEntry);
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      });
    </script>
  </head>
  <body>

    <script src="/app/teachplay-certificate-preview.js" defer></script>
    <script src="/app/teachplay-student-guide-links.js" defer></script>
  </body>
</html>
